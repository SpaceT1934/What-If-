services:
  - type: web
    name: kanshan-universe-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: ark
      - key: ARK_BASE_URL
        value: https://ark.cn-beijing.volces.com/api/v3
      - key: ARK_MODEL
        value: doubao-seed-1-6-flash-250828
      - key: ARK_FALLBACK_MODELS
        value: doubao-seed-1-6-flash-250828
      - key: ZHIHU_SEARCH_URL
        value: https://developer.zhihu.com/api/v1/content/zhihu_search
